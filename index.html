<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón de Fotos con Borde Rosa</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        /* EFECTO MÁGICO DEL BORDE ROSA:
           drop-shadow aplica una sombra con la forma exacta del conjunto de elementos hijos.
           Al poner 4 sombras en las 4 direcciones sin difuminado, creamos un borde perfecto de 4px.
        */
        .heart-outline-wrapper {
            filter: 
                drop-shadow(4px 0px 0px #f4a2b8) 
                drop-shadow(-4px 0px 0px #f4a2b8) 
                drop-shadow(0px 4px 0px #f4a2b8) 
                drop-shadow(0px -4px 0px #f4a2b8)
                drop-shadow(0px 10px 15px rgba(0,0,0,0.1)); /* Suave sombra base para dar profundidad */
            padding: 10px;
        }

        /* Contenedor Grid: Rejilla exacta de 9x9 */
        .heart-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 6px; /* Pequeña separación interna como en la foto original */
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
        }

        /* Estilo de los bloques contenedores (Enlaces de las fotos) */
        .heart-grid a {
            display: block;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            text-decoration: none;
            background-color: #fceef2;
            transition: transform 0.2s ease, z-index 0s;
            z-index: 1;
        }

        /* Al pasar el cursor, la foto resalta */
        .heart-grid a:hover {
            transform: scale(1.12);
            z-index: 10;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        /* Control de Imágenes y Transición de Rotación */
        .heart-grid img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.4s ease-in-out;
        }

        .fade-out { opacity: 0; }

        /* Proporciones de celdas */
        .c-square { aspect-ratio: 1.1 / 1; } /* Ligeramente rectangular para imitar las fotos del collage original */
        .c-large { grid-column: span 2; grid-row: span 2; aspect-ratio: 1.1 / 1; }
        .c-wide { grid-column: span 2; aspect-ratio: 2.2 / 1; }

        /* ==============================================================
           DISTRIBUCIÓN GEOMÉTRICA DEL CORAZÓN (9 COLUMNAS x 9 FILAS)
           ============================================================== */

        /* FILA 1 */
        .pos-1 { grid-row: 1; grid-column: 2; }
        .pos-2 { grid-row: 1; grid-column: 3; }
        .pos-3 { grid-row: 1; grid-column: 4; }
        .pos-4 { grid-row: 1; grid-column: 6; }
        .pos-5 { grid-row: 1; grid-column: 7; }
        .pos-6 { grid-row: 1; grid-column: 8; }

        /* FILA 2 */
        .pos-7 { grid-row: 2; grid-column: 1; }
        .pos-8 { grid-row: 2; grid-column: 2; } 
        .pos-9 { grid-row: 2; grid-column: 3 / span 2; grid-row: 2 / span 2; } /* Foto Grande Izquierda */
        .pos-10 { grid-row: 2; grid-column: 5; }
        .pos-11 { grid-row: 2; grid-column: 6 / span 2; grid-row: 2 / span 2; } /* Foto Grande Derecha */
        .pos-12 { grid-row: 2; grid-column: 8; }
        .pos-13 { grid-row: 2; grid-column: 9; }

        /* FILA 3 */
        .pos-14 { grid-row: 3; grid-column: 1; }
        .pos-15 { grid-row: 3; grid-column: 2; }
        .pos-16 { grid-row: 3; grid-column: 5; }
        .pos-17 { grid-row: 3; grid-column: 8; }
        .pos-18 { grid-row: 3; grid-column: 9; }

        /* FILA 4 (Centro Ancho) */
        .pos-19 { grid-row: 4; grid-column: 1; }
        .pos-20 { grid-row: 4; grid-column: 2 / span 2; }
        .pos-21 { grid-row: 4; grid-column: 4 / span 2; grid-row: 4 / span 2; } /* Foto Grande Central */
        .pos-22 { grid-row: 4; grid-column: 6 / span 2; }
        .pos-23 { grid-row: 4; grid-column: 8; }
        .pos-24 { grid-row: 4; grid-column: 9; }

        /* FILA 5 */
        .pos-25 { grid-row: 5; grid-column: 1; }
        .pos-26 { grid-row: 5; grid-column: 2; }
        .pos-27 { grid-row: 5; grid-column: 3; }
        .pos-28 { grid-row: 5; grid-column: 6; }
        .pos-29 { grid-row: 5; grid-column: 7; }
        .pos-30 { grid-row: 5; grid-column: 8; }
        .pos-31 { grid-row: 5; grid-column: 9; }

        /* FILA 6 */
        .pos-32 { grid-row: 6; grid-column: 2; }
        .pos-33 { grid-row: 6; grid-column: 3; }
        .pos-34 { grid-row: 6; grid-column: 4; }
        .pos-35 { grid-row: 6; grid-column: 5; }
        .pos-36 { grid-row: 6; grid-column: 6; }
        .pos-37 { grid-row: 6; grid-column: 7; }
        .pos-38 { grid-row: 6; grid-column: 8; }

        /* FILA 7 */
        .pos-39 { grid-row: 7; grid-column: 3; }
        .pos-40 { grid-row: 7; grid-column: 4; }
        .pos-41 { grid-row: 7; grid-column: 5; }
        .pos-42 { grid-row: 7; grid-column: 6; }
        .pos-43 { grid-row: 7; grid-column: 7; }

        /* FILA 8 */
        .pos-44 { grid-row: 8; grid-column: 4; }
        .pos-45 { grid-row: 8; grid-column: 5; }
        .pos-46 { grid-row: 8; grid-column: 6; }

        /* FILA 9 (Punta Inferior) */
        .pos-47 { grid-row: 9; grid-column: 5; }

    </style>

    <script>
        // ALBUM DE IMÁGENES ROTATIVAS:
        // Agrega aquí los arreglos con las URLs de tus fotos reales para cada casilla (del 1 al 47)
        const carruselFotos = {
            1: ["https://picsum.photos/300/300?random=1", "https://picsum.photos/300/300?random=81"],
            2: ["https://picsum.photos/300/300?random=2", "https://picsum.photos/300/300?random=82"],
            9: ["https://picsum.photos/600/600?random=9", "https://picsum.photos/600/600?random=83"],  /* Foto grande lóbulo izq */
            11: ["https://picsum.photos/600/600?random=11", "https://picsum.photos/600/600?random=84"], /* Foto grande lóbulo der */
            21: ["https://picsum.photos/600/600?random=21", "https://picsum.photos/600/600?random=85"], /* Centro del corazón */
            47: ["https://picsum.photos/300/300?random=47", "https://picsum.photos/300/300?random=86"]  /* Punta de abajo */
        };

        // Inicializador de índices
        let fotoActualIndex = {};
        for (let i = 1; i <= 47; i++) {
            fotoActualIndex[i] = 0;
        }

        // Función encargada de ejecutar el cambio cada minuto
        function rotarMosaico() {
            for (let i = 1; i <= 47; i++) {
                if (carruselFotos[i] && carruselFotos[i].length > 1) {
                    const celdaA = document.getElementById(`cell-${i}`);
                    if (!celdaA) continue;

                    const imagenHtml = celdaA.querySelector('img');
                    
                    fotoActualIndex[i] = (fotoActualIndex[i] + 1) % carruselFotos[i].length;
                    const proximaRuta = carruselFotos[i][fotoActualIndex[i]];

                    // Efecto de desvanecimiento suave (Crossfade)
                    imagenHtml.classList.add('fade-out');
                    setTimeout(() => {
                        imagenHtml.src = proximaRuta;
                        imagenHtml.classList.remove('fade-out');
                    }, 400); 
                }
            }
        }

        // 60000ms = 1 Minuto
        setInterval(rotarMosaico, 60000);
    </script>
